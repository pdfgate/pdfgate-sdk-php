name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Manual test tag. Must use the test-* namespace, for example test-2026-03-16-1.'
        required: true
        type: string
      release_mode:
        description: 'Manual test release mode. Only prerelease is allowed.'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPStan
        run: composer run stan

      - name: Run unit tests
        run: composer run test:unit

      - name: Prepare release metadata and notes
        id: prepare_release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RELEASE_TEST_TAG: ${{ inputs.test_tag }}
          RELEASE_MODE: ${{ inputs.release_mode }}
        run: ./scripts/prepare-release.sh

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release.outputs.release_tag }}
          name: ${{ steps.prepare_release.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          generate_release_notes: true

      - name: Create GitHub prerelease (manual test)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release.outputs.release_tag }}
          name: ${{ steps.prepare_release.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          generate_release_notes: true
          prerelease: true
