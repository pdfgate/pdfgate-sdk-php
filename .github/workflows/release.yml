name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Manual test tag. Must use the test-* namespace, for example test-2026-03-16-1.'
        required: true
        type: string
      release_mode:
        description: 'Manual test release mode. Only prerelease is allowed.'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPStan
        run: composer run stan

      - name: Run unit tests
        run: composer run test:unit

      - name: Validate production tag format
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' must match vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Create GitHub prerelease (manual test)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.test_tag }}
          name: ${{ inputs.test_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: true
